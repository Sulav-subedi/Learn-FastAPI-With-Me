<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Noted.</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2ED;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --border-strong: #C8C2B8;
    --text: #1A1814;
    --muted: #7A756C;
    --accent: #2D6A4F;
    --accent-light: #D8EEE3;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --tag-bg: #EDE9E3;
    --tag-text: #5A5550;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Lora', serif;
  }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px 7px 34px;
    width: 220px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    width: 280px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--bg); border-color: var(--border-strong); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: #235C42; border-color: #235C42; }

  .btn-danger {
    color: var(--danger);
    border-color: transparent;
    background: transparent;
  }

  .btn-danger:hover { background: var(--danger-light); border-color: var(--danger-light); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 1.5rem;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    padding: 0 8px;
  }

  .sidebar-item {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .sidebar-item:hover { background: var(--bg); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); }

  .sidebar-item .count {
    font-size: 11px;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 1px 7px;
    border-radius: 10px;
  }

  .sidebar-item.active .count {
    background: var(--accent-light);
    color: var(--accent);
  }

  .tag-list { display: flex; flex-direction: column; gap: 2px; }

  /* ── MAIN ── */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  .notes-toolbar {
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .notes-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .sort-select {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .notes-area {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    overflow: hidden;
  }

  /* ── NOTE LIST ── */
  .note-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg);
  }

  .note-list-item {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    background: var(--bg);
  }

  .note-list-item:hover { background: #EDE9E3; }
  .note-list-item.active { background: var(--surface); border-left: 3px solid var(--accent); padding-left: calc(1.25rem - 2px); }

  .note-list-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-list-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .note-list-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .note-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .tag-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--tag-text);
  }

  /* ── NOTE EDITOR ── */
  .note-editor {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .editor-header {
    padding: 1.25rem 1.5rem 0;
    border-bottom: 1px solid var(--border);
  }

  .editor-title-input {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    width: 100%;
    margin-bottom: 0.75rem;
  }

  .editor-title-input::placeholder { color: var(--muted); }

  .editor-meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .tag-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .inline-tag-input {
    font-family: var(--mono);
    font-size: 11px;
    border: 1px dashed var(--border-strong);
    border-radius: 10px;
    padding: 2px 8px;
    background: transparent;
    color: var(--text);
    outline: none;
    width: 100px;
  }

  .inline-tag-input:focus { border-color: var(--accent); }

  .editor-body {
    flex: 1;
    padding: 1.25rem 1.5rem;
    overflow-y: auto;
  }

  .editor-body textarea {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.8;
    width: 100%;
    height: 100%;
    min-height: 400px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    resize: none;
  }

  .editor-body textarea::placeholder { color: var(--muted); }

  .editor-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .editor-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .editor-actions { display: flex; gap: 8px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 12px;
    padding: 2rem;
    text-align: center;
  }

  .empty-icon {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--border-strong);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .empty-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--text);
  }

  .empty-sub {
    font-family: var(--mono);
    font-size: 12px;
    max-width: 240px;
  }

  /* ── TOAST ── */
  .toast-area {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }

  .toast {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    background: var(--text);
    color: var(--bg);
    animation: slideIn 0.2s ease;
    border-left: 3px solid var(--accent);
  }

  .toast.error { border-left-color: var(--danger); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── API BADGE ── */
  .api-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .api-badge.get    { color: #27500A; background: #EAF3DE; border-color: #C0DD97; }
  .api-badge.post   { color: #0C447C; background: #E6F1FB; border-color: #B5D4F4; }
  .api-badge.put    { color: #633806; background: #FAEEDA; border-color: #FAC775; }
  .api-badge.delete { color: #791F1F; background: #FCEBEB; border-color: #F7C1C1; }

  /* ── SETTINGS MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.5rem;
    width: 420px;
    border: 1px solid var(--border);
  }

  .modal-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .form-row {
    margin-bottom: 0.75rem;
  }

  .form-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    display: block;
  }

  .form-input {
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  .form-input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

  .note-list-empty {
    padding: 2rem;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .notes-area { grid-template-columns: 1fr; }
    .note-list { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">noted<span>.</span></div>
  <div class="topbar-right">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search notes..." oninput="handleSearch()" />
    </div>
    <button class="btn btn-primary" onclick="newNote()">+ New note</button>
    <button class="btn" onclick="openSettings()">API settings</button>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Library</div>
      <button class="sidebar-item active" id="filter-all" onclick="setFilter('all', this)">
        All notes <span class="count" id="count-all">0</span>
      </button>
      <button class="sidebar-item" id="filter-pinned" onclick="setFilter('pinned', this)">
        Pinned <span class="count" id="count-pinned">0</span>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div class="tag-list" id="tag-list">
        <div style="font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 4px 10px;">No tags yet</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">API calls made</div>
      <div style="padding: 0 8px; display: flex; flex-direction: column; gap: 6px;" id="api-log"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="notes-toolbar">
      <span class="notes-count" id="notes-count">0 notes</span>
      <select class="sort-select" onchange="handleSort(this.value)">
        <option value="updated">Sort: recently updated</option>
        <option value="created">Sort: date created</option>
        <option value="title">Sort: title A–Z</option>
      </select>
    </div>

    <div class="notes-area">
      <!-- LIST -->
      <div class="note-list" id="note-list">
        <div class="note-list-empty" id="list-empty" style="display:none;">No notes found.</div>
      </div>

      <!-- EDITOR -->
      <div class="note-editor" id="note-editor">
        <div class="empty-state" id="editor-empty">
          <div class="empty-icon">✎</div>
          <div class="empty-title">Select a note to read it</div>
          <div class="empty-sub">Or create a new one with the button above</div>
        </div>

        <div id="editor-form" style="display:none; flex-direction:column; height:100%;">
          <div class="editor-header">
            <input class="editor-title-input" id="note-title" type="text" placeholder="Note title..." oninput="markDirty()" />
            <div class="editor-meta-row">
              <div class="tag-input-wrap" id="active-tags"></div>
              <input class="inline-tag-input" id="tag-input" placeholder="+ add tag" onkeydown="handleTagKey(event)" />
              <label style="font-family: var(--mono); font-size: 12px; color: var(--muted); display:flex; align-items:center; gap:5px; cursor:pointer;">
                <input type="checkbox" id="pin-toggle" onchange="markDirty()" />
                Pin
              </label>
            </div>
          </div>
          <div class="editor-body">
            <textarea id="note-body" placeholder="Start writing..." oninput="markDirty()"></textarea>
          </div>
          <div class="editor-footer">
            <span class="editor-status" id="editor-status">Unsaved</span>
            <div class="editor-actions">
              <button class="btn btn-danger" onclick="deleteNote()">Delete</button>
              <button class="btn btn-primary" onclick="saveNote()">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- API SETTINGS MODAL -->
<div class="overlay" id="settings-overlay" onclick="closeSettings(event)">
  <div class="modal">
    <div class="modal-title">API settings</div>
    <div class="form-row">
      <label class="form-label">Backend base URL</label>
      <input class="form-input" id="api-url" value="http://localhost:8000" />
    </div>
    <div class="form-row">
      <label class="form-label">Auth token (Bearer)</label>
      <input class="form-input" id="api-token" placeholder="Leave blank if no auth" />
    </div>
    <div style="font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.6;">
      Point this at your FastAPI server. See the browser console for full request/response details.
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST AREA -->
<div class="toast-area" id="toast-area"></div>

<script>
const DEFAULT_URL = 'http://localhost:8000';
let API_URL = localStorage.getItem('api_url') || DEFAULT_URL;
let API_TOKEN = localStorage.getItem('access_token') || '';

let notes = [];
let activeNote = null;
let dirty = false;
let currentFilter = 'all';
let currentSort = 'updated';
let searchQuery = '';
let currentTagFilter = null;
let activeTags = [];

function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (API_TOKEN) h['Authorization'] = `Bearer ${API_TOKEN}`;
  return h;
}

function logAPI(method, path) {
  const log = document.getElementById('api-log');
  const badge = document.createElement('div');
  badge.innerHTML = `<span class="api-badge ${method.toLowerCase()}">${method}</span> <span style="font-family:var(--mono);font-size:11px;color:var(--muted);">${path}</span>`;
  badge.style.display = 'flex';
  badge.style.alignItems = 'center';
  badge.style.gap = '6px';
  log.prepend(badge);
  while (log.children.length > 5) log.removeChild(log.lastChild);
}

function toast(msg, isError = false) {
  const area = document.getElementById('toast-area');
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  area.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function api(method, path, body) {
  logAPI(method, path);
  const opts = { method, headers: headers() };
  if (body !== undefined) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API_URL + path, opts);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    if (r.status === 204) return null;
    return await r.json();
  } catch (e) {
    if (e.message.includes('Failed to fetch')) {
      toast('Cannot reach backend — is your FastAPI server running?', true);
    } else {
      toast('Error: ' + e.message, true);
    }
    console.error('[API]', method, path, e);
    throw e;
  }
}

async function loadNotes() {
  try {
    const data = await api('GET', '/notes');
    notes = data;
    renderAll();
    toast('Fetched ' + notes.length + ' notes');
  } catch (_) {}
}

function getFiltered() {
  let list = [...notes];
  if (currentFilter === 'pinned') list = list.filter(n => n.pinned);
  if (currentTagFilter) list = list.filter(n => (n.tags || []).includes(currentTagFilter));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(n => n.title.toLowerCase().includes(q) || (n.body || '').toLowerCase().includes(q));
  }
  list.sort((a, b) => {
    if (currentSort === 'title') return a.title.localeCompare(b.title);
    if (currentSort === 'created') return new Date(b.created_at) - new Date(a.created_at);
    return new Date(b.updated_at) - new Date(a.updated_at);
  });
  return list;
}

function renderAll() {
  renderList();
  renderSidebar();
}

function renderList() {
  const list = document.getElementById('note-list');
  const filtered = getFiltered();
  const empty = document.getElementById('list-empty');

  Array.from(list.children).forEach(c => { if (c.id !== 'list-empty') c.remove(); });

  document.getElementById('notes-count').textContent = filtered.length + ' note' + (filtered.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(note => {
    const div = document.createElement('div');
    div.className = 'note-list-item' + (activeNote && activeNote.id === note.id ? ' active' : '');
    const date = new Date(note.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const tags = (note.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');
    const pin = note.pinned ? '<span class="tag-pill" style="background:#D8EEE3;color:#2D6A4F;">pinned</span>' : '';
    div.innerHTML = `
      <div class="note-list-title">${note.title || 'Untitled'}</div>
      <div class="note-list-preview">${(note.body || '').slice(0, 60) || '—'}</div>
      <div class="note-list-meta">${pin}${tags}<span class="note-date">${date}</span></div>
    `;
    div.onclick = () => selectNote(note);
    list.appendChild(div);
  });
}

function renderSidebar() {
  document.getElementById('count-all').textContent = notes.length;
  document.getElementById('count-pinned').textContent = notes.filter(n => n.pinned).length;

  const allTags = [...new Set(notes.flatMap(n => n.tags || []))];
  const tagList = document.getElementById('tag-list');
  tagList.innerHTML = '';
  if (allTags.length === 0) {
    tagList.innerHTML = '<div style="font-family:var(--mono);font-size:12px;color:var(--muted);padding:4px 10px;">No tags yet</div>';
    return;
  }
  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item' + (currentTagFilter === tag ? ' active' : '');
    const count = notes.filter(n => (n.tags || []).includes(tag)).length;
    btn.innerHTML = `${tag} <span class="count">${count}</span>`;
    btn.onclick = () => {
      currentTagFilter = (currentTagFilter === tag) ? null : tag;
      renderAll();
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      if (currentTagFilter) btn.classList.add('active');
      else document.getElementById('filter-all').classList.add('active');
    };
    tagList.appendChild(btn);
  });
}

function selectNote(note) {
  activeNote = note;
  activeTags = [...(note.tags || [])];
  dirty = false;

  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-form').style.display = 'flex';
  document.getElementById('note-title').value = note.title || '';
  document.getElementById('note-body').value = note.body || '';
  document.getElementById('pin-toggle').checked = !!note.pinned;
  document.getElementById('editor-status').textContent = 'Saved';
  renderActiveTags();
  renderList();
}

function renderActiveTags() {
  const wrap = document.getElementById('active-tags');
  wrap.innerHTML = '';
  activeTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag-pill';
    span.style.cursor = 'pointer';
    span.textContent = tag + ' ×';
    span.onclick = () => { activeTags = activeTags.filter(t => t !== tag); markDirty(); renderActiveTags(); };
    wrap.appendChild(span);
  });
}

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(',', '');
    if (val && !activeTags.includes(val)) { activeTags.push(val); markDirty(); renderActiveTags(); }
    e.target.value = '';
  }
}

function markDirty() {
  dirty = true;
  document.getElementById('editor-status').textContent = 'Unsaved changes';
}

function newNote() {
  activeNote = { id: null, title: '', body: '', tags: [], pinned: false };
  activeTags = [];
  dirty = true;
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-form').style.display = 'flex';
  document.getElementById('note-title').value = '';
  document.getElementById('note-body').value = '';
  document.getElementById('pin-toggle').checked = false;
  document.getElementById('editor-status').textContent = 'New note — not saved yet';
  renderActiveTags();
}

async function saveNote() {
  const title = document.getElementById('note-title').value.trim();
  const body = document.getElementById('note-body').value;
  const pinned = document.getElementById('pin-toggle').checked;
  if (!title) { toast('Title cannot be empty', true); return; }

  const payload = { title, body, tags: activeTags, pinned };

  try {
    if (!activeNote.id) {
      const created = await api('POST', '/notes', payload);
      notes.unshift(created);
      activeNote = created;
      toast('Note created');
    } else {
      const updated = await api('PUT', `/notes/${activeNote.id}`, payload);
      const idx = notes.findIndex(n => n.id === activeNote.id);
      if (idx !== -1) notes[idx] = updated;
      activeNote = updated;
      toast('Note saved');
    }
    dirty = false;
    document.getElementById('editor-status').textContent = 'Saved';
    renderAll();
  } catch (_) {}
}

async function deleteNote() {
  if (!activeNote || !activeNote.id) {
    activeNote = null;
    document.getElementById('editor-form').style.display = 'none';
    document.getElementById('editor-empty').style.display = 'flex';
    return;
  }
  if (!confirm('Delete this note?')) return;
  try {
    await api('DELETE', `/notes/${activeNote.id}`);
    notes = notes.filter(n => n.id !== activeNote.id);
    activeNote = null;
    document.getElementById('editor-form').style.display = 'none';
    document.getElementById('editor-empty').style.display = 'flex';
    toast('Note deleted');
    renderAll();
  } catch (_) {}
}

function setFilter(filter, btn) {
  currentFilter = filter;
  currentTagFilter = null;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value;
  renderList();
}

function handleSort(val) {
  currentSort = val;
  renderList();
}

function openSettings() {
  document.getElementById('api-url').value = API_URL;
  document.getElementById('api-token').value = API_TOKEN;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings(e) {
  if (!e || e.target === document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').classList.remove('open');
}

function saveSettings() {
  API_URL = document.getElementById('api-url').value.trim();
  API_TOKEN = document.getElementById('api-token').value.trim();
  localStorage.setItem('api_url', API_URL);
  localStorage.setItem('access_token', API_TOKEN);
  document.getElementById('settings-overlay').classList.remove('open');
  toast('Settings saved — reloading notes...');
  loadNotes();
}

function logout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('api_url');
  window.location.href = 'login.html';
}

loadNotes();
</script>
</body>
</html>
